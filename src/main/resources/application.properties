# MySQL (Uncomment and update password to use MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/tutorease_db?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=Prabuddha2006
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
server.port=8081
spring.main.allow-circular-references=true

# JSP View Resolver configuration
spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Force UTF-8 Encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.force=true
server.servlet.encoding.enabled=true
